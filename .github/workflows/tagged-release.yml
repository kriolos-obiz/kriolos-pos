name: "Tagged Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 1. Job Único: Gera apenas os documentos e cria a Release
  build-docs:
    name: "Generate Docs & Create Release"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: maven

      - name: Build Docs with Maven
        run: mvn package -Pdocs-gen -B --file pom.xml

      - name: Create Release and Upload Docs
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          title: "Release ${{ github.ref_name }}"
          prerelease: false
          files: |
            LICENSE.txt
            CHANGELOG.txt
            docs/guide-comercial/target/generated-docs/pdf/kriolos-pos-*.pdf
            docs/guide-devel/target/generated-docs/pdf/kriolos-pos-*.pdf
            docs/guide-user/target/generated-docs/pdf/kriolos-pos-*.pdf

  # 2. Job em Matriz: Executa em paralelo para cada OS apenas o perfil de distribuição
  build-binaries:
    name: "Build Binary for ${{ matrix.os }}"
    needs: build-docs # Garante que só avança após a release e os docs estarem criados
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux
            artifact_path: kriolos-opos-jpackage/target/kriolosPOS
          - os: windows-latest
            suffix: win
            artifact_path: kriolos-opos-jpackage/target/kriolosPOS
          - os: macos-latest
            suffix: macos
            artifact_path: kriolos-opos-jpackage/target/kriolosPOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: maven

      - name: Build Distribution with Maven
        run: mvn package -Pdistribuition -B --file pom.xml

      - name: Zip Artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          zip -r "kriolosPOS-${{ matrix.suffix }}.zip" "${{ matrix.artifact_path }}"

      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.artifact_path }}" -DestinationPath "kriolosPOS-${{ matrix.suffix }}.zip"

      - name: Upload Binaries to Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          title: "Release ${{ github.ref_name }}"
          prerelease: false
          files: |
            kriolosPOS-${{ matrix.suffix }}.zip
            kriolos-opos-app/target/*.zip
