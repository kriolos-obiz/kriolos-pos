name: "Tagged Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 1. Single Job: Generates documentation, cross-platform apps, builds code, and initializes the GitHub Release
  build-docs:
    name: "Generate Docs & Create Release"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Build everything: docs, classes, jars, and cross-platform packages
      - name: Build Docs and App Package with Maven
        run: mvn package -Pdocs-gen,distribuition -B --file pom.xml

      # Share the compiled state (target folders and jars) with subsequent matrix jobs
      - name: Upload Compiled Workspace Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-compiled-workspace
          path: |
            .
            !**/target/kriolosPOS*
            !**/target/dist/**
          retention-days: 1

      - name: Create Release and Upload Docs & Cross-Platform App
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            LICENSE*
            CHANGELOG*
            kriolos-opos-app/target/kriolos-opos-app-*.zip
            docs/guide-comercial/target/generated-docs/pdf/kriolos-pos-*.pdf
            docs/guide-devel/target/generated-docs/pdf/kriolos-pos-*.pdf
            docs/guide-user/target/generated-docs/pdf/kriolos-pos-*.pdf

  # 2. Matrix Job: Runs in parallel for each OS to build the OS-specific application binaries using the cached build
  build-binaries:
    name: "Build Binary for ${{ matrix.os }}"
    needs: build-docs # Ensures binaries are uploaded only after the release and shared workspace are ready
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux
            ext: "tar.gz"
            image_path: kriolos-krpos-jpackage/target/dist/image
            installer_glob: kriolos-krpos-jpackage/target/dist/installer/*.deb
          - os: macos-latest
            suffix: macos
            ext: "tar.gz"
            image_path: kriolos-krpos-jpackage/target/dist/image
            installer_glob: kriolos-krpos-jpackage/target/dist/installer/*.dmg
          - os: windows-latest
            suffix: win
            ext: "zip"
            image_path: kriolos-krpos-jpackage/target/dist/image
            installer_glob: kriolos-krpos-jpackage/target/dist/installer/*.msi

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Ensure packaging dependencies are available on the Linux runner to create DEB packages
      - name: Install Linux Packaging Tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev    

      # Download the pre-compiled workspace from the first job to avoid recompiling Java code
      - name: Download Compiled Workspace Artifacts
        uses: actions/download-artifact@v4
        with:
          name: maven-compiled-workspace
          path: .

      # Fixed: Enclosed Maven property flags in quotes to prevent PowerShell parsing issues on Windows
      - name: Build Native Distribution Package with Maven
        run: mvn package -Pjpackage -pl kriolos-krpos-jpackage -B "-Dmaven.main.skip=true" "-Dmaven.test.skip=true" --file pom.xml

      # Compress standalone application directories using tar.gz on Unix to preserve executable permissions
      - name: Tar Artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd ${{ matrix.image_path }}
          tar -czf "${{ github.workspace }}/kriolosPOS-image-${{ matrix.suffix }}.${{ matrix.ext }}" .

      # Compress standalone application directories using zip on Windows
      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.image_path }}\*" -DestinationPath "kriolosPOS-image-${{ matrix.suffix }}.${{ matrix.ext }}" -Force

      # Move native installer artifacts to the root directory for easier release upload
      - name: Prepare Native Installer for Upload (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp ${{ matrix.installer_glob }} .

      - name: Prepare Native Installer for Upload (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item -Path ${{ matrix.installer_glob }} -Destination .

      # Upload both the standalone compressed images and the native system installers to the GitHub Release
      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            kriolosPOS-image-*.*
            *.deb
            *.msi
            *.dmg
          fail_on_unmatched_files: false
