name: "Tagged Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 1. Single Job: Generates documentation, cross-platform apps, and initializes the GitHub Release
  build-docs:
    name: "Generate Docs & Create Release"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: maven

      # Build both docs and the cross-platform application package once
      - name: Build Docs and App Package with Maven
        run: mvn package -Pdocs-gen,distribuition -B --file pom.xml

      - name: Create Release and Upload Docs & Cross-Platform App
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            LICENSE*
            CHANGELOG*
            kriolos-opos-app/target/kriolos-opos-app-*.zip
            docs/guide-comercial/target/generated-docs/pdf/kriolos-pos-*.pdf
            docs/guide-devel/target/generated-docs/pdf/kriolos-pos-*.pdf
            docs/guide-user/target/generated-docs/pdf/kriolos-pos-*.pdf

  # 2. Matrix Job: Runs in parallel for each OS to build the OS-specific application binaries
  build-binaries:
    name: "Build Binary for ${{ matrix.os }}"
    needs: build-docs # Ensures binaries are uploaded only after the release is created
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux
            artifact_path: kriolos-opos-jpackage/target/kriolosPOS
          - os: windows-latest
            suffix: win
            artifact_path: kriolos-opos-jpackage/target/kriolosPOS
          - os: macos-latest
            suffix: macos
            artifact_path: kriolos-opos-jpackage/target/kriolosPOS*

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: maven

      - name: Build Distribution with Maven
        run: mvn package -Pdistribuition -B --file pom.xml

      # Fix applied here: using dynamic path resolution with wildcard to match folders or .app bundles safely
      - name: Zip Artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          zip -r "kriolosPOS-${{ matrix.suffix }}.zip" ${{ matrix.artifact_path }}

      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.artifact_path }}" -DestinationPath "kriolosPOS-${{ matrix.suffix }}.zip"

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            kriolosPOS-${{ matrix.suffix }}.zip
